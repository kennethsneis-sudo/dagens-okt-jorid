function esc(s){ return (s||"").replace(/[&<>]/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;"}[m])); }
function chip(zone,size){ const z=ZONES[zone];
  return `<span class="chip ${size}" style="background:${z.dim};color:${z.c};border:1px solid ${z.c}55"><span class="dot" style="background:${z.c}"></span>${z.label}</span>`; }

function render(){
  const today=localISO(new Date());
  const next=localISO((()=>{const d=parseISO(sel);d.setDate(d.getDate()+1);return d;})());
  const prev=localISO((()=>{const d=parseISO(sel);d.setDate(d.getDate()-1);return d;})());
  const first=PLAN[0]?.date, last=PLAN[PLAN.length-1]?.date;
  const inRange=first&&sel>=first&&sel<=last;

  const s=byDate(sel); const zone=s?classify(s):"none"; const z=ZONES[zone];
  const fase=(s&&s.hoved&&classify(s)!=="race")?s.hoved:null;

  // hero
  const hero=`
    <div class="hero" style="border:1px solid ${z.c}40; box-shadow:0 0 0 1px #0b1117,0 10px 30px -18px ${z.c}">
      <div class="top" style="background:${z.c}"></div>
      <div class="body">
        <div class="meta">
          <div class="eyebrow mono">${sel===today?"I dag":"Valgt dag"} · ${s?esc(s.dag):""} ${pretty(sel)}</div>
          ${fase?`<span class="fase mono">${esc(fase)}</span>`:""}
        </div>
        ${chip(zone,"lg")}
        <div class="dur mono">${fmtDur(s?s.min:null)}</div>
        <div class="okt">${s&&s.okt?esc(s.okt):"Ingen planlagt økt."}</div>
        ${s&&s.kom?`<div class="kom" style="border-left:2px solid ${z.c}">${esc(s.kom)}</div>`:""}
      </div>
    </div>`;

  // next
  const ns=byDate(next); const nz=ns?classify(ns):"none";
  const nextCard=`
    <div class="next">
      <div class="lbl mono">Neste · ${ns?esc(ns.dag):""} ${pretty(next)}</div>
      <div class="row">${chip(nz,"sm")}<span class="ndur mono">${fmtDur(ns?ns.min:null)}</span></div>
      <div class="nokt">${ns&&ns.okt?esc(ns.okt):"Ingen planlagt økt."}</div>
    </div>`;

  // week
  const days=weekDates(sel);
  const wk=byDate(days.find(d=>byDate(d))||days[0]);
  const rows=days.map(d=>{
    const ds=byDate(d); const dz=ds?classify(ds):"none"; const c=ZONES[dz].c;
    const active=d===sel;
    return `<button class="day${active?" active":""}" data-d="${d}"
      style="${active?`background:#1b2731;border:1px solid ${c}55`:""}">
      <span class="dg mono">${ds?esc(ds.dag).slice(0,3):""}</span>
      <span class="dot" style="background:${c}"></span>
      <span class="dk">${ds&&ds.okt?esc(ds.okt):"—"}</span>
      <span class="dd mono" style="${active?`color:${c}`:""}">${ds?fmtDur(ds.min):""}</span>
    </button>`;
  }).join("");
  const week=`<div class="week"><div class="wlbl mono">${wk?esc(wk.week):"Uke"}</div>${rows}</div>`;

  const banner=!inRange?`<div class="banner">Ingen plan lagt for ${pretty(sel)}. Aktiv plan dekker ${pretty(first)} – ${pretty(last)} ${last.slice(0,4)}.</div>`:"";

  const stamp = offline
    ? `Frakoblet · viser lagret plan`
    : (fetchedAt?`Plan hentet ${fetchedAt}`:`Innebygd plan`);

  document.getElementById("app").innerHTML=`
    <div class="topbar">
      <div>
        <div class="title">Dagens økt</div>
        <div class="sub mono">Plan_Kenneth · ${sel===today?"live dato":"bla"}</div>
      </div>
      <div class="nav">
        <button class="nb" data-go="prev">‹</button>
        <button class="nb solid" data-go="today">I dag</button>
        <button class="nb" data-go="next">›</button>
      </div>
    </div>
    ${banner}${hero}${nextCard}${week}
    <div class="foot">
      <span class="mono">${stamp}</span>
      <button class="rf mono" data-go="refresh">Oppdater</button>
    </div>`;

  document.querySelectorAll("[data-d]").forEach(b=>b.onclick=()=>{sel=b.dataset.d;render();});
  document.querySelectorAll("[data-go]").forEach(b=>b.onclick=()=>{
    const g=b.dataset.go;
    if(g==="prev")sel=prev; else if(g==="next")sel=next; else if(g==="today")sel=today;
    else if(g==="refresh"){loadLive(true);return;}
    render();
  });
}

async function loadLive(force){
  try{
    const r=await fetch(SRC+"?t="+Date.now(),{cache:"no-store"});
    if(!r.ok)throw 0;
    const data=await r.json();
    if(Array.isArray(data)&&data.length){
      PLAN=data; offline=false;
      const now=new Date(); fetchedAt=`${String(now.getHours()).padStart(2,"0")}:${String(now.getMinutes()).padStart(2,"0")}`;
      try{ localStorage.setItem("plan_cache",JSON.stringify({data,at:fetchedAt})); }catch(e){}
    }
  }catch(e){
    try{
      const c=JSON.parse(localStorage.getItem("plan_cache")||"null");
      if(c&&c.data){ PLAN=c.data; fetchedAt=c.at; }
    }catch(e2){}
    offline=true;
  }
  render();
}

// init: cached first (instant), then network
try{ const c=JSON.parse(localStorage.getItem("plan_cache")||"null"); if(c&&c.data){PLAN=c.data;fetchedAt=c.at;} }catch(e){}
render();
loadLive();
document.addEventListener("visibilitychange",()=>{ if(!document.hidden) loadLive(); });

if("serviceWorker" in navigator){ navigator.serviceWorker.register("./sw.js").catch(()=>{}); }
</script>
</body>
</html>
